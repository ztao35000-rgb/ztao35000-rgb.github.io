<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Minecraft Java Editing - Home</title>
    <!-- ใช้ Google Fonts ที่ดูทันสมัย -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Kanit:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary-accent: #4ade80; /* สีเขียวสดใสสไตล์ Minecraft */
            --secondary-accent: #3b82f6; /* สีฟ้าสำหรับ Windows/Web */
            --mods-accent: #a855f7; /* สีม่วงสำหรับ Mods */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Kanit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 480px;
            margin-top: 20px;
        }

        /* --- Header Section --- */
        .header-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .header-card img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header-text h1 {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.2;
            color: var(--text-main);
        }

        .header-text p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* --- Download Buttons Container --- */
        .download-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .download-item {
            background: var(--card-bg);
            padding: 18px 22px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .download-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .download-item:active {
            transform: scale(0.97);
        }

        .content-left {
            display: flex;
            flex-direction: column;
        }

        .platform-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .download-title {
            font-size: 16px;
            font-weight: 600;
        }

        .icon-arrow {
            width: 32px;
            height: 32px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            transition: background 0.3s, color 0.3s;
        }

        /* สีกรอบข้างและ Hover Effect เฉพาะปุ่ม */
        .android-border { border-left: 6px solid #4ade80; }
        .android-border:hover { border-color: #4ade80; }
        .android-border:hover .icon-arrow { background: #4ade80; color: white; }

        .windows-border { border-left: 6px solid #3b82f6; }
        .windows-border:hover { border-color: #3b82f6; }
        .windows-border:hover .icon-arrow { background: #3b82f6; color: white; }

        .web-border { border-left: 6px solid #f59e0b; }
        .web-border:hover { border-color: #f59e0b; }
        .web-border:hover .icon-arrow { background: #f59e0b; color: white; }

        /* ปรับแต่งพิเศษสำหรับปุ่ม Mods */
        .mods-border { border-left: 6px solid var(--mods-accent); background: #faf5ff; }
        .mods-border:hover { border-color: var(--mods-accent); background: #f3e8ff; }
        .mods-border:hover .icon-arrow { background: var(--mods-accent); color: white; }
        .mods-border .download-title { color: #7e22ce; }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: var(--text-muted);
        }

        @media (max-height: 500px) {
            .header-card { padding: 15px; margin-bottom: 15px; }
            .header-card img { width: 50px; height: 50px; }
            .header-text h1 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- ส่วนหัว -->
        <div class="header-card">
            <img src="images/appaaa.png" alt="LeviLauncher Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/626/626610.png'">
            <div class="header-text">
                <h1>Minecraft PE for Mods<br>LeviLaunchroid</h1>
                <p>Powered by LeviMC</p>
            </div>
        </div>

        <!-- รายการดาวน์โหลด -->
        <div class="download-list">
            
            <!-- Android -->
            <a href="https://github.com/LiteLDev/LeviLaunchroid/releases" class="download-item android-border">
                <div class="content-left">
                    <span class="platform-label">Android Version</span>
                    <span class="download-title">Download from GitHub</span>
                </div>
                <div class="icon-arrow">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l9-9M7 8h9v9"/></svg>
                </div>
            </a>

            <!-- Windows -->
            <a href="https://github.com/LiteLDev/LeviLauncher/releases" class="download-item windows-border">
                <div class="content-left">
                    <span class="platform-label">Windows Version</span>
                    <span class="download-title">Download from GitHub</span>
                </div>
                <div class="icon-arrow">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l9-9M7 8h9v9"/></svg>
                </div>
            </a>

            <!-- Official Site -->
            <a href="https://levimc.org/" class="download-item web-border">
                <div class="content-left">
                    <span class="platform-label">Official Site</span>
                    <span class="download-title">Visit LeviMC Website</span>
                </div>
                <div class="icon-arrow">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
                </div>
            </a>

            <!-- Mods Site (New Button) -->
            <a href="modspe.html" class="download-item mods-border">
                <div class="content-left">
                    <span class="platform-label">Mods SITE</span>
                    <span class="download-title">Download Mods for list</span>
                </div>
                <div class="icon-arrow">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                </div>
            </a>

        </div>

        <div class="footer-note">
            <p>© 2024 LeviMC Team. All rights reserved.</p>
        </div>
    </div>

</body>
</html>
