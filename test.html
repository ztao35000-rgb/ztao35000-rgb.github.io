
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Minecraft Launcher Hub - Mobile</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb;
            --primary-green: #10b981;
            --bg-color: #f1f5f9;
            --top-bar-color: #1e293b;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Kanit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- Top Navigation --- */
        .top-bar {
            background-color: var(--top-bar-color);
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .back-button {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
        }

        .search-container {
            background-color: white;
            flex-grow: 1;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 0 12px;
        }

        .search-input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 14px;
        }

        /* --- Main Layout --- */
        .main-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .app-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.2s;
        }

        .app-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .app-logo {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            object-fit: cover;
            background: #f8fafc;
        }

        .app-info h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .app-info p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* --- Buttons --- */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-blue);
            color: white;
        }

        .btn-secondary {
            background-color: #f1f5f9;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
        }

        .btn-google-play {
            background-color: #000000;
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* Landscape optimization */
        @media (max-height: 500px) {
            .main-container { flex-direction: row; flex-wrap: wrap; max-width: 95%; }
            .app-card { flex: 1; min-width: 300px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
<a href="index.html" class="back-button">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    Back
</a>

        <div class="search-container">
            <input type="text" class="search-input" placeholder="ค้นหาแอป...">
        </div>
    </div>

    <div class="main-container">
        
        <!-- App 1: Fold Craft Launcher -->
        <div class="app-card">
            <div class="app-header">
                <img src="images/test.png" alt="FCL Logo" class="app-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/626/626610.png'">
                <div class="app-info">
                    <h2 translate="no">Fold Craft Launcher</h2>
                    <p>FCL - Fast & Lightweight</p>
                </div>
            </div>
            <div class="btn-list">
                <a href="https://github.com/FCL-Team/FoldCraftLauncher/releases" class="btn btn-primary">
                    Download All Versions (GitHub)
                </a>
            </div>
        </div>

        <!-- App 2: PojavLauncher -->
        <div class="app-card">
            <div class="app-header">
                <img src="images/pojav.png" alt="Pojav Logo" class="app-logo" onerror="this.src='https://pojavlauncherteam.github.io/assets/img/icon.png'">
                <div class="app-info">
                    <h2 translate="no">PojavLauncher</h2>
                    <p>Most Popular Java Launcher</p>
                </div>
            </div>
            <div class="btn-list">
                <a href="https://play.google.com/store/apps/details?id=net.kdt.pojavlaunch&hl=es_MX&referrer=utm_source%3Dgoogle%26utm_medium%3Dorganic%26utm_term%3Dgoogle+play+store+pojavlauncher" class="btn btn-google-play">
                    Download from Google Play
                </a>
                <a href="https://github.com/PojavLauncherTeam/PojavLauncher/releases?page=2" class="btn btn-secondary">
                    Download All Versions (GitHub)
                </a>
            </div>
        </div>

        <div style="text-align: center; margin-top: 10px;">
            <a href="test.html" style="color: var(--primary-blue); font-size: 14px; text-decoration: none;">[ ดูแอปพลิเคชันทั้งหมด ]</a>
        </div>

    </div>

</body>
</html>
